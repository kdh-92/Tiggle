name: Deploy to NAS Server

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Gate: Backend tests must pass before deploy ──
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/tiggle-root
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Test
        run: ./gradlew :tiggle:test

  # ── Gate: Frontend tests must pass before deploy ──
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/tiggle
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/tiggle/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npx vitest run --passWithNoTests

      - name: Build
        run: npm run build

  # ── Deploy (only after all tests pass) ──
  deploy:
    name: Deploy
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH Deploy to NAS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          command_timeout: 15m
          script: |
            bash -l -c "
              cd Tiggle
              git pull origin main
              ./server.sh
            "
