spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test;MODE=MySQL;
    username: test
    password:
  h2:
    console:
      enabled: true
  jpa:
    database: h2
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: always
  servlet:
    multipart:
      enabled: true
      location: upload/image/
      max-request-size: 20MB
      max-file-size: 10MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 1234
            client-secret: 1234
            authorization-grant-type: authorization_code
            scope:
              - profile
              - email
          naver:
            client-id: 1234
            client-secret: 1234
            client-authentication-method: post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/{action}/oauth2/code/{registrationId}"
            scope:
              - nickname
              - email
              - profile_image
            client-name: Naver
          kakao:
            client-id: 1234
            client-secret: 1234
            client-authentication-method: post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/{action}/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
part:
  upload:
    path: upload/image/
    profile:
      path: upload/profile
      max-size: 5242880  # 5MB
      allowed-types:
        - image/jpeg
        - image/png
        - image/gif
    transaction:
      path: upload/transaction
      max-size: 10485760  # 10MB
      allowed-types:
        - image/jpeg
        - image/png
        - image/gif

app:
  client-redirect-uri: http://localhost:3000/login/success

jwt:
  secret: NOWkq30xLIX5NLuVbmMtVvoXGvtYbP9f6-Vq2df5_zY
  access-token-expiry: 86400
  refresh-token-expiry: 604800

log:
  rolling:
    directory: logs
    file-name: tiggle-backend.log
    pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [TraceId: %X{traceId:-no-trace}] - %msg%n"
    max-history: 30
    total-size-cap: 10MB

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:~/test
    driver-class-name: org.h2.Driver
    username: test
    password:

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never
